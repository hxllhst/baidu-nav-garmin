name: Build Connect IQ DataField

on:
  workflow_dispatch:
  push:
    paths:
      - "garmin/**"
      - ".github/workflows/connectiq.yml"

jobs:
  prg:
    runs-on: ubuntu-latest
    env:
      GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
      GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 (monkeyc runs on Java)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install connect-iq-sdk-manager CLI
        run: |
          mkdir -p "$HOME/bin"
          curl -s https://raw.githubusercontent.com/lindell/connect-iq-sdk-manager-cli/master/install.sh | sh -s -- -b "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Accept Connect IQ agreement
        run: connect-iq-sdk-manager agreement accept --agreement-hash="${{ secrets.CIQ_AGREEMENT_HASH }}"

      - name: Garmin login
        run: connect-iq-sdk-manager login

      - name: Download Connect IQ SDK 9.x and set as current
        run: |
          connect-iq-sdk-manager sdk set '^9.2.0'
          echo "$(connect-iq-sdk-manager sdk current-path --bin)" >> "$GITHUB_PATH"

      - name: Download device configs listed in manifest
        run: connect-iq-sdk-manager device download --manifest=garmin/manifest.xml

      - name: Restore developer key from secret
        run: echo "${{ secrets.CIQ_DEVELOPER_KEY_B64 }}" | base64 -d > developer_key.der

      - name: Build sideload package (.prg, fenix7x)
        working-directory: garmin
        run: monkeyc -d fenix7x -f monkey.jungle -o BaiduNav.prg -y ../developer_key.der -w

      - name: Build store package (.iq)
        working-directory: garmin
        run: monkeyc -e -f monkey.jungle -o BaiduNav.iq -y ../developer_key.der -w

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BaiduNav-ConnectIQ
          path: |
            garmin/BaiduNav.prg
            garmin/BaiduNav.iq
