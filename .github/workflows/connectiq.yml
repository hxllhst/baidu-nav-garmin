name: Build Connect IQ DataField

on:
  push:
    paths:
      - 'garmin/**'
      - '.github/workflows/connectiq.yml'
  workflow_dispatch:

env:
  # 临时使用，先设置为空以便查看可用版本
  CIQ_SDK_VERSION: ''
  # 侧载 .prg 的目标设备
  SIDELOAD_DEVICES: 'fenix7'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Connect IQ SDK manager
        run: |
          curl -s https://raw.githubusercontent.com/lindell/connect-iq-sdk-manager-cli/master/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Accept agreement & login
        env:
          GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          if [ -z "$GARMIN_USERNAME" ] || [ -z "$GARMIN_PASSWORD" ]; then
            echo "::error::请在仓库 Settings → Secrets and variables → Actions 中配置 GARMIN_USERNAME / GARMIN_PASSWORD(你的 Garmin 账号, 用于下载官方设备定义文件)"
            exit 1
          fi
          connect-iq-sdk-manager agreement accept
          connect-iq-sdk-manager login

      # ★ 新增：查看所有可用 SDK 版本 ★
      - name: List available SDK versions
        id: list_sdks
        run: |
          echo "=========================================="
          echo "All available Connect IQ SDK versions:"
          echo "=========================================="
          
          # 方法1：使用 list 命令查看所有版本
          echo ""
          echo "--- Full list ---"
          connect-iq-sdk-manager sdk list
          
          echo ""
          echo "--- Filtered versions ---"
          # 提取所有版本号（数字.数字.数字格式）
          ALL_VERSIONS=$(connect-iq-sdk-manager sdk list 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | sort -V | uniq)
          
          if [ -z "$ALL_VERSIONS" ]; then
            echo "No versions found via grep, trying alternative method..."
            # 如果 grep 没找到，尝试其他格式
            ALL_VERSIONS=$(connect-iq-sdk-manager sdk list 2>/dev/null | grep -oE '[0-9]+\.[0-9]+' | sort -V | uniq)
          fi
          
          echo "$ALL_VERSIONS"
          
          # 提取 7.x 版本
          VERSIONS_7X=$(echo "$ALL_VERSIONS" | grep -E '^7\.' || true)
          # 提取 6.x 版本
          VERSIONS_6X=$(echo "$ALL_VERSIONS" | grep -E '^6\.' || true)
          # 获取最新版本（取最后一个）
          LATEST_VERSION=$(echo "$ALL_VERSIONS" | tail -n1)
          LATEST_7X=$(echo "$VERSIONS_7X" | tail -n1)
          LATEST_6X=$(echo "$VERSIONS_6X" | tail -n1)
          
          echo ""
          echo "=========================================="
          echo "Summary:"
          echo "  7.x versions: $VERSIONS_7X"
          echo "  6.x versions: $VERSIONS_6X"
          echo "  Latest 7.x: $LATEST_7X"
          echo "  Latest 6.x: $LATEST_6X"
          echo "  Overall latest: $LATEST_VERSION"
          echo "=========================================="
          
          # 保存到输出变量
          echo "all_versions=$ALL_VERSIONS" >> $GITHUB_OUTPUT
          echo "latest_7x=$LATEST_7X" >> $GITHUB_OUTPUT
          echo "latest_6x=$LATEST_6X" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT

      - name: Determine SDK version to use
        id: determine_version
        run: |
          # 检查是否手动指定了版本
          if [ -n "${{ env.CIQ_SDK_VERSION }}" ]; then
            echo "Using specified version: ${{ env.CIQ_SDK_VERSION }}"
            echo "sdk_version=${{ env.CIQ_SDK_VERSION }}" >> $GITHUB_OUTPUT
          else
            # 自动选择：优先 7.x，否则 6.x，否则最新
            if [ -n "${{ steps.list_sdks.outputs.latest_7x }}" ]; then
              SDK_VERSION="${{ steps.list_sdks.outputs.latest_7x }}"
              echo "Auto-selected 7.x version: $SDK_VERSION"
            elif [ -n "${{ steps.list_sdks.outputs.latest_6x }}" ]; then
              SDK_VERSION="${{ steps.list_sdks.outputs.latest_6x }}"
              echo "Auto-selected 6.x version (fallback): $SDK_VERSION"
            else
              SDK_VERSION="${{ steps.list_sdks.outputs.latest_version }}"
              echo "Auto-selected latest version: $SDK_VERSION"
            fi
            echo "sdk_version=$SDK_VERSION" >> $GITHUB_OUTPUT
          fi
          
          echo "Final SDK version: $SDK_VERSION"

      - name: Install SDK & device files
        run: |
          SDK_VERSION="${{ steps.determine_version.outputs.sdk_version }}"
          echo "Installing SDK version: $SDK_VERSION"
          connect-iq-sdk-manager sdk set "$SDK_VERSION"
          connect-iq-sdk-manager device download --manifest=garmin/manifest.xml

      - name: Prepare developer key
        env:
          CIQ_DEVELOPER_KEY_B64: ${{ secrets.CIQ_DEVELOPER_KEY_B64 }}
        run: |
          if [ -n "$CIQ_DEVELOPER_KEY_B64" ]; then
            echo "$CIQ_DEVELOPER_KEY_B64" | base64 -d > developer_key.der
            echo "使用仓库 Secret 中的固定开发者密钥"
          else
            openssl genrsa -out /tmp/dk.pem 4096
            openssl pkcs8 -topk8 -inform PEM -outform DER \
              -in /tmp/dk.pem -out developer_key.der -nocrypt
            echo "已临时生成开发者密钥(每次构建不同; 如需固定请配置 CIQ_DEVELOPER_KEY_B64)"
          fi

      - name: Build .iq and per-device .prg
        run: |
          export PATH="$(connect-iq-sdk-manager sdk current-path --bin):$PATH"
          mkdir -p out/prg
          # 商店发布用 .iq(包含 manifest 中所有设备)
          monkeyc -f garmin/monkey.jungle -y developer_key.der -w -e -o out/BaiduNavDataField.iq
          # 侧载用 .prg(逐个设备编译)
          for d in $SIDELOAD_DEVICES; do
            echo "==== build $d ===="
            monkeyc -f garmin/monkey.jungle -y developer_key.der -w -r \
              -d "$d" -o "out/prg/BaiduNav-$d.prg"
          done
          ls -lR out

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BaiduNav-ConnectIQ
          path: out/
