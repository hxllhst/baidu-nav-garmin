name: list sdk chatgpt

on:
  push:
    paths:
      - 'garmin/**'
      - '.github/workflows/connectiq.yml'
  workflow_dispatch:

env:
  # 建议固定 SDK 版本，不要使用 ^7.1.0
  CIQ_SDK_VERSION: '7.2.0'

  # manifest.xml 中支持的设备
  SIDELOAD_DEVICES: 'fenix7 fenix6pro fr965 fr955 fr245 venu3 edge840 edge1040'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Show SDK list  
        run: |
          connect-iq-sdk-manager sdk list
      
      - name: Show download help
        run: |
          connect-iq-sdk-manager sdk download --help


